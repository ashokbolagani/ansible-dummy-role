---
# tasks file for kk
- name: install apache httpd
  ansible.builtin.yum:
    name: httpd
    state: present
    update_cache: yes
- name: copy the index.html into /var/www/html
  ansible.builtin.copy:
    src: files/index.html
    dest: /var/www/html
    owner: root
    group: root
    mode: '0644'
